name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Python tests (ML engine)
        run: npm run build:python

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('engine-python/Dockerfile', 'engine-python/requirements.txt', 'engine-python/app/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build ML engine Docker image
        uses: docker/build-push-action@v6
        with:
          context: engine-python
          file: engine-python/Dockerfile
          push: false
          load: true
          tags: hippocrates/ml-engine:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Verify image exists
        run: docker image inspect hippocrates/ml-engine:ci

      - name: Test container starts and responds
        run: |
          docker run -d --name ml-ci -p 8000:8000 hippocrates/ml-engine:ci
          sleep 3
          curl -f http://localhost:8000/health
          docker stop ml-ci
          docker rm ml-ci
